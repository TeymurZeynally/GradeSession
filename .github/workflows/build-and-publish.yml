name: Build and publish Docker image

on:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_FILE: './GradeSession.slnx'
  DOCKERFILE: './GradeSession.Server/Dockerfile'
  BUILD_CONTEXT: '.'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Prepare image and release names
        id: vars
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          RELEASE_TAG="v0.0.${GITHUB_RUN_NUMBER}"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          echo "Image name: $IMAGE_NAME"
          echo "Release tag: $RELEASE_TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=raw,value=${{ steps.vars.outputs.release_tag }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
          IMAGE_NAME: ${{ steps.vars.outputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Docker image published:

          \`\`\`
          $IMAGE_NAME:$RELEASE_TAG
          $IMAGE_NAME:latest
          $IMAGE_NAME:main
          Digest: $IMAGE_DIGEST
          \`\`\`
          EOF

          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md
